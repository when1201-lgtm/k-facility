<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>K-Facility | 시설관리 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<!-- Firebase SDK — 준비되면 주석 해제 -->
<!-- <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script> -->
<!-- <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script> -->
<!-- <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script> -->
<!-- <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script> -->
<style>
/* ══════════════════════════════════════
   RESET & BASE
══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans KR',sans-serif;background:#080c18;color:#fff;-webkit-font-smoothing:antialiased}

/* ══════════════════════════════════════
   CSS VARIABLES
══════════════════════════════════════ */
:root{
  --orange:#e05c0a;
  --orange-g:rgba(224,92,10,.35);
  --blue:#1d4ed8;
  --blue-g:rgba(29,78,216,.35);
  --green:#10b981;
  --green-g:rgba(16,185,129,.30);
  --amber:#f59e0b;
  --red:#f43f5e;
  --purple:#7c3aed;
  --t1:rgba(255,255,255,1);
  --t2:rgba(255,255,255,.72);
  --t3:rgba(255,255,255,.42);
  --t4:rgba(255,255,255,.22);
  --gb:rgba(255,255,255,.08);
  --gborder:rgba(255,255,255,.15);
  --blur:16px;
  --r:14px;
  --rl:20px;
  --sidebar:66px;
  --hh:58px;
}

/* ══════════════════════════════════════
   BACKGROUND ORBS
══════════════════════════════════════ */
.bg-layer{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.52;will-change:transform}
.o1{width:620px;height:620px;background:radial-gradient(circle,#1a4fff 0%,transparent 70%);top:-160px;left:-110px;animation:fOrb 11s ease-in-out infinite}
.o2{width:500px;height:500px;background:radial-gradient(circle,#e05c0a 0%,transparent 70%);top:60px;right:-90px;animation:fOrb 13s ease-in-out infinite 1.5s}
.o3{width:460px;height:460px;background:radial-gradient(circle,#0d9488 0%,transparent 70%);bottom:40px;left:22%;animation:fOrb 15s ease-in-out infinite 3s}
.o4{width:340px;height:340px;background:radial-gradient(circle,#7c3aed 0%,transparent 70%);bottom:-60px;right:9%;animation:fOrb 9s ease-in-out infinite .8s}
@keyframes fOrb{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.04)}}

/* ══════════════════════════════════════
   GLASS UTILITIES
══════════════════════════════════════ */
.glass{background:var(--gb);border:1px solid var(--gborder);backdrop-filter:blur(var(--blur)) saturate(160%);-webkit-backdrop-filter:blur(var(--blur)) saturate(160%);border-radius:var(--r)}
.glass-s{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);border-radius:var(--r)}
.gc{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:12px;transition:background .2s,border-color .2s,transform .2s,box-shadow .2s}
.gc:hover{background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.20);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.35)}

/* ══════════════════════════════════════
   APP SHELL
══════════════════════════════════════ */
#app{position:relative;z-index:1;display:flex;height:100vh;width:100vw}

/* ══════════════════════════════════════
   SIDEBAR
══════════════════════════════════════ */
#sidebar{width:var(--sidebar);height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:3px;flex-shrink:0;background:rgba(8,12,24,.65);border-right:1px solid rgba(255,255,255,.08);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:10;overflow-y:auto;scrollbar-width:none}
#sidebar::-webkit-scrollbar{display:none}
.s-logo{color:#fff;font-size:12px;font-weight:700;letter-spacing:.06em;padding:6px 0 10px;text-align:center}
.s-logo em{color:var(--orange);font-style:normal}
.s-div{width:32px;height:1px;background:rgba(255,255,255,.10);margin:5px 0;flex-shrink:0}
.nb{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--t3);cursor:pointer;border:none;background:transparent;font-size:17px;transition:background .15s,color .15s;position:relative;flex-shrink:0}
.nb:hover{background:rgba(255,255,255,.10);color:var(--t1)}
.nb.active{background:var(--orange);color:#fff;box-shadow:0 4px 14px var(--orange-g)}
.nb.active:hover{background:var(--orange)}
.tip{position:absolute;left:54px;top:50%;transform:translateY(-50%);background:rgba(8,12,24,.92);border:1px solid rgba(255,255,255,.14);color:var(--t1);font-size:12px;font-weight:500;padding:5px 11px;border-radius:8px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:100}
.nb:hover .tip{opacity:1}

/* ══════════════════════════════════════
   MAIN
══════════════════════════════════════ */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── HEADER ── */
#hdr{height:var(--hh);display:flex;align-items:center;gap:12px;padding:0 20px;background:rgba(8,12,24,.60);border-bottom:1px solid rgba(255,255,255,.08);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);flex-shrink:0;z-index:5}
.h-logo{font-size:16px;font-weight:700;color:var(--t1);white-space:nowrap}
.h-logo em{color:var(--orange);font-style:normal}
.srch{flex:1;max-width:460px;position:relative}
.srch input{width:100%;height:38px;border:1px solid rgba(255,255,255,.14);border-radius:99px;padding:0 14px 0 38px;font-size:13px;color:var(--t1);background:rgba(255,255,255,.07);backdrop-filter:blur(8px);outline:none;font-family:inherit;transition:border-color .15s,background .15s}
.srch input::placeholder{color:var(--t3)}
.srch input:focus{border-color:rgba(255,255,255,.32);background:rgba(255,255,255,.11)}
.srch i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px}
.h-right{display:flex;align-items:center;gap:9px;margin-left:auto}
.ibtn{width:38px;height:38px;border-radius:99px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);cursor:pointer;color:var(--t2);font-size:15px;transition:background .15s;position:relative}
.ibtn:hover{background:rgba(255,255,255,.14)}
.ibtn.dot::after{content:'';position:absolute;top:8px;right:8px;width:7px;height:7px;background:var(--orange);border-radius:50%;border:2px solid #080c18}
.ava{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--blue));display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;cursor:pointer;border:2px solid rgba(255,255,255,.15);transition:transform .15s}
.ava:hover{transform:scale(1.08)}
.uname{font-size:13px;font-weight:500;color:var(--t2);white-space:nowrap}
.tsw{width:46px;height:26px;background:rgba(255,255,255,.12);border-radius:99px;border:none;cursor:pointer;position:relative;transition:background .2s}
.tsk{width:20px;height:20px;background:#fff;border-radius:50%;position:absolute;top:3px;left:22px;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}

/* ── PAGE ── */
#page{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent}
#page::-webkit-scrollbar{width:5px}
#page::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:99px}
.pi{padding:20px 20px 40px}

/* ══════════════════════════════════════
   COMMON COMPONENTS
══════════════════════════════════════ */
.breadcrumb{display:flex;align-items:center;gap:7px;margin-bottom:18px}
.bc-home{font-size:11px;color:var(--t3);cursor:pointer}
.bc-sep{font-size:11px;color:var(--t4)}
.bc-cur{font-size:12px;font-weight:600;color:var(--t2)}
.bc-date{margin-left:auto;font-size:11px;color:var(--t3)}
.slbl{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--t3);margin-bottom:10px}
.ctitle{font-size:15px;font-weight:600;color:var(--t1);margin-bottom:4px}

/* STATUS PILL */
.spill{display:flex;align-items:center;gap:6px;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.28);border-radius:99px;padding:5px 13px;white-space:nowrap;flex-shrink:0}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pDot 2s ease-in-out infinite}
@keyframes pDot{0%,100%{opacity:1}50%{opacity:.4}}
.stxt{font-size:11px;font-weight:600;color:var(--green)}

/* BADGES */
.rb{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px}
.rb-done{background:rgba(16,185,129,.15);color:#6ee7b7;border:1px solid rgba(16,185,129,.25)}
.rb-prog{background:rgba(224,92,10,.15);color:#fba87a;border:1px solid rgba(224,92,10,.25)}
.rb-todo{background:rgba(255,255,255,.07);color:var(--t3);border:1px solid rgba(255,255,255,.10)}

/* BUTTONS */
.btn-o{background:var(--orange);color:#fff;border:none;border-radius:10px;padding:8px 15px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;transition:opacity .2s,transform .15s;box-shadow:0 4px 12px var(--orange-g)}
.btn-o:hover{opacity:.88;transform:translateY(-1px)}
.btn-b{background:rgba(29,78,216,.22);color:#93c5fd;border:1px solid rgba(29,78,216,.38);border-radius:10px;padding:8px 15px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;transition:background .2s,transform .15s}
.btn-b:hover{background:rgba(29,78,216,.35);transform:translateY(-1px)}
.btn-gh{background:transparent;color:var(--t2);border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:8px 15px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;transition:background .2s,transform .15s}
.btn-gh:hover{background:rgba(255,255,255,.09);transform:translateY(-1px)}
.act-row{display:flex;gap:10px;margin-bottom:4px}
.act-p{flex:2;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--blue),#2563eb);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .2s,transform .15s}
.act-p:hover{opacity:.88;transform:translateY(-1px)}
.act-g{flex:1;padding:14px;border-radius:14px;cursor:pointer;color:var(--t2);font-size:13px;font-weight:600;font-family:inherit;border:none;transition:background .2s,transform .15s}
.act-g:hover{background:rgba(255,255,255,.12);transform:translateY(-1px)}

/* ══════════════════════════════════════
   HOME — BENTO TOP
══════════════════════════════════════ */
.bento{display:grid;grid-template-columns:1fr 1fr 300px;gap:14px}

/* Work card */
.wcard{padding:18px;overflow:hidden}
.thead{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:14px}
.trow{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.thumb{flex:1;aspect-ratio:16/9;border-radius:9px;overflow:hidden;position:relative;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09)}
.tph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:5px}
.tph .pi2{font-size:18px;opacity:.3}
.tph .pt2{font-size:10px;color:var(--t4);font-weight:500}
.tlbl{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.5);color:#fff;font-size:9px;font-weight:600;padding:3px 7px;letter-spacing:.05em}
.arw{color:var(--orange);font-size:15px;flex-shrink:0;padding:0 5px}
.mini-row{display:flex;gap:7px;flex-wrap:wrap}
.mini{flex:1;min-width:100px;padding:9px 11px;border-radius:9px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}
.ml{font-size:10px;color:var(--t3);margin-bottom:3px}
.mv{font-size:12px;font-weight:600;color:var(--t1)}
.md{font-size:10px;color:var(--t4);margin-top:2px}

/* Roadmap card */
.rcard{padding:18px;overflow:hidden}
.ri{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.ri:last-child{border-bottom:none}
.rdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rdot.done{background:var(--green);box-shadow:0 0 6px var(--green)}
.rdot.prog{background:var(--orange);box-shadow:0 0 6px var(--orange)}
.rdot.todo{background:rgba(255,255,255,.2)}
.rtxt{font-size:13px;color:var(--t2);flex:1}
.rdt{font-size:11px;color:var(--t4);white-space:nowrap}

/* Check card */
.ccard{padding:18px;grid-row:1/3}
.pw{background:rgba(255,255,255,.08);border-radius:99px;height:5px;margin:8px 0 14px}
.pf{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--orange),#f97316);transition:width .4s ease}
.ci{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px}
.ci:last-of-type{border-bottom:none}
.chk{width:18px;height:18px;border-radius:5px;border:1.5px solid rgba(255,255,255,.22);background:transparent;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;transition:background .15s,border-color .15s,color .15s}
.chk.on{background:var(--orange);border-color:var(--orange);color:#fff}
.ct{color:var(--t2)}.ct.done{text-decoration:line-through;color:var(--t4)}
.sdiv{height:1px;background:rgba(255,255,255,.07);margin:14px 0}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sbox{padding:12px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);text-align:center}
.snum{font-size:22px;font-weight:700;line-height:1}
.slb2{font-size:10px;color:var(--t3);margin-top:4px}

/* Menu section */
.msec{grid-column:1/3}
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.mc{padding:16px 14px;cursor:pointer;display:flex;flex-direction:column;gap:8px}
.mi{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.mn{font-size:14px;font-weight:600;color:var(--t1)}
.ms{font-size:11px;color:var(--t3)}
.mbg{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;width:fit-content}
.mwide{grid-column:span 2}
.mwi{display:flex;align-items:center;gap:14px}
.bprev{display:flex;gap:3px;align-items:flex-end}
.bar{width:8px;border-radius:3px}

/* ══════════════════════════════════════
   BA-DETAIL
══════════════════════════════════════ */
.ba-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.ba-ch{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px}
.ba-cl{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase}
.bgal{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;padding:0 16px 16px}
.gi{aspect-ratio:4/3;border-radius:10px;overflow:hidden;position:relative;cursor:pointer;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);transition:transform .2s,box-shadow .2s}
.gi:hover{transform:scale(1.04);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.gi.wide{grid-column:span 2;aspect-ratio:16/7}
.gph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:5px}
.gph .gi2{font-size:20px;opacity:.28}
.gph .gt2{font-size:10px;color:var(--t4);font-weight:500}
.ctk{position:relative;height:200px;border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,.12);cursor:col-resize;user-select:none}
.ctb{position:absolute;inset:0;background:linear-gradient(135deg,#1a1a2e 0%,#0f3460 100%);display:flex;align-items:center;justify-content:center}
.cta{position:absolute;inset:0;background:linear-gradient(135deg,#0a2a1a 0%,#0f4a2a 100%);display:flex;align-items:center;justify-content:center;clip-path:inset(0 50% 0 0)}
.cfl{font-size:13px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.06em}
.cln{position:absolute;top:0;bottom:0;left:50%;width:2px;background:#fff;transform:translateX(-50%);z-index:3;pointer-events:none}
.chn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:center;z-index:4;box-shadow:0 4px 14px rgba(0,0,0,.5);font-size:16px;color:#1a1a2e;pointer-events:none}
.spg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.spi{padding:12px 14px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09)}
.spi.wide{grid-column:span 2}
.spll{font-size:10px;color:var(--t3);margin-bottom:4px;font-weight:500;letter-spacing:.04em}
.spvl{font-size:13px;font-weight:600;color:var(--t1);line-height:1.5}
.ai-ic{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--purple),var(--blue));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ai-bt{margin-left:auto;font-size:10px;color:rgba(124,58,237,.8);background:rgba(124,58,237,.14);border:1px solid rgba(124,58,237,.22);padding:3px 9px;border-radius:99px}
.ai-hi{color:var(--amber);font-weight:600}
.ai-rc{margin-top:11px;padding:10px 13px;border-radius:10px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.20);font-size:12px;color:rgba(251,191,36,.9);line-height:1.65}
.pr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.05)}
.pr:last-child{border-bottom:none}
.prn{font-size:13px;color:var(--t2)}
.prs{font-size:11px;color:var(--t4);margin-top:2px}
.prq{font-size:12px;color:var(--t3);background:rgba(255,255,255,.07);padding:3px 10px;border-radius:7px;white-space:nowrap}
.mc2{display:flex;align-items:center;gap:7px;padding:7px 13px;border-radius:99px;font-size:12px;font-weight:500;color:var(--t2)}

/* ══════════════════════════════════════
   ENTRANCE ANIMATIONS
══════════════════════════════════════ */
@keyframes fUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fu  {animation:fUp .4s ease both}
.fu1 {animation:fUp .4s ease .05s both}
.fu2 {animation:fUp .4s ease .12s both}
.fu3 {animation:fUp .4s ease .20s both}
.fu4 {animation:fUp .4s ease .28s both}
.fu5 {animation:fUp .4s ease .36s both}

/* ══════════════════════════════════════
   LOGIN OVERLAY
══════════════════════════════════════ */
#lov{position:fixed;inset:0;background:rgba(5,8,18,.82);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);display:flex;align-items:center;justify-content:center;z-index:9999}
.lcard{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.20);backdrop-filter:blur(28px) saturate(200%);-webkit-backdrop-filter:blur(28px) saturate(200%);border-radius:28px;padding:40px 36px;width:360px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.45)}
.ll{font-size:26px;font-weight:800;color:var(--t1);margin-bottom:5px}
.ll em{color:var(--orange);font-style:normal}
.ls{font-size:13px;color:var(--t3);margin-bottom:30px;line-height:1.65}
.bg{width:100%;padding:13px;border-radius:12px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);font-size:14px;font-weight:600;color:var(--t1);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:10px;transition:background .2s}
.bg:hover{background:rgba(255,255,255,.14)}
.ldv{display:flex;align-items:center;gap:9px;color:var(--t4);font-size:12px;margin:12px 0}

/* ════════════════════════════════════════
   FIREBASE CONFIG  — 값 채우고 위 SDK 주석 해제
════════════════════════════════════════ */
const FB_CFG = {
  apiKey:'YOUR_API_KEY', authDomain:'YOUR_PROJECT.firebaseapp.com',
  projectId:'YOUR_PROJECT_ID', storageBucket:'YOUR_PROJECT.appspot.com',
  messagingSenderId:'YOUR_SENDER_ID', appId:'YOUR_APP_ID'
};

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
const S = { page:'home', user:null, guest:false, fbReady:false, dark:true };

/* ════════════════════════════════════════
   HELPERS
════════════════════════════════════════ */
const $  = id => document.getElementById(id);
const dateStr = () => new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});

/* ════════════════════════════════════════
   FIREBASE
════════════════════════════════════════ */
function initFB() {
  if (typeof firebase === 'undefined') return;
  try {
    firebase.initializeApp(FB_CFG);
    S.fbReady = true;
    firebase.auth().onAuthStateChanged(u => { if (u) onLogin(u, false); });
  } catch(e) { console.warn('Firebase init failed', e); }
}
function loginGoogle() {
  if (!S.fbReady) { alert('Firebase 설정이 필요합니다.\nFB_CFG 값을 채워주세요.'); return; }
  const p = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(p).then(r => onLogin(r.user, false)).catch(console.error);
}
function loginGuest() {
  onLogin({ displayName:'게스트', uid:'guest' }, true);
}
function onLogin(user, guest) {
  S.user = user; S.guest = guest;
  const init = (user.displayName||'U').charAt(0).toUpperCase();
  $('ava').textContent = init;
  $('uname').textContent = user.displayName || '사용자';
  if (guest) $('ava').style.background = 'linear-gradient(135deg,#64748b,#475569)';
  $('lov').classList.add('hidden');
  goto('home');
}

/* ════════════════════════════════════════
   ROUTER
════════════════════════════════════════ */
const ROUTES = {
  home, electric, mechanical, construction, fire, records, memo, roadmap,
  search, contacts, stats, settings, 'ba-detail': baDetail
};
function goto(p) {
  if (!ROUTES[p]) return;
  S.page = p;
  document.querySelectorAll('.nb').forEach(b => b.classList.toggle('active', b.dataset.p === p));
  ROUTES[p]();
}

/* ════════════════════════════════════════
   TEMPLATE HELPERS
════════════════════════════════════════ */
function bc(cur) {
  return `<div class="breadcrumb">
    <span class="bc-home" onclick="goto('home')">🏠</span>
    <span class="bc-sep">/</span>
    <span class="bc-cur">${cur}</span>
    <span class="bc-date">${dateStr()}</span>
  </div>`;
}
function riItem(cls,txt,dt,badge,bcls) {
  return `<div class="ri"><div class="rdot ${cls}"></div><span class="rtxt">${txt}</span><span class="rdt">${dt}</span><span class="rb ${bcls}">${badge}</span></div>`;
}
function ckItem(on, txt) {
  return `<div class="ci"><div class="chk${on?' on':''}"> ${on?'✓':''}</div><span class="ct${on?' done':''}">${txt}</span></div>`;
}
function stBox(n, lbl, col) {
  return `<div class="sbox"><div class="snum" style="color:${col}">${n}</div><div class="slb2">${lbl}</div></div>`;

function mCard(p,icon,bg,name,sub,bbg,bc2,badge) {
  return `<div class="gc mc" onclick="goto('${p}')">

function mcChip(ic,txt) {

/* ════════════════════════════════════════
   CHECKLIST
════════════════════════════════════════ */
function initChecklist() {
  document.querySelectorAll('.chk').forEach(c => {
    c.addEventListener('click', () => {
      c.classList.toggle('on');
      c.textContent = c.classList.contains('on') ? '✓' : '';
      c.nextElementSibling.classList.toggle('done', c.classList.contains('on'));
      const all = document.querySelectorAll('.chk').length;
      const done = document.querySelectorAll('.chk.on').length;
      const pct = Math.round(done/all*100);
      const pf = $('pf'); if (pf) pf.style.width = pct+'%';
      const cc = $('cc'); if (cc) cc.textContent = done+' / '+all+' 완료';
      const cp = $('cp'); if (cp) cp.textContent = pct+'%';
    });
  });
}

/* ════════════════════════════════════════
   COMPARE SLIDER
════════════════════════════════════════ */
function initSlider() {
  const track = $('ctk'), after = $('cta'), line = $('cln'), handle = $('chn');
  if (!track) return;
  let drag = false;
  function set(x) {
    const r = track.getBoundingClientRect();
    const p = Math.max(0,Math.min(100,((x-r.left)/r.width)*100));
    after.style.clipPath = `inset(0 ${(100-p).toFixed(1)}% 0 0)`;
    line.style.left = handle.style.left = p+'%';
  }
  track.addEventListener('mousedown',  e=>{drag=true;set(e.clientX)});
  window.addEventListener('mousemove', e=>{if(drag)set(e.clientX)});
  window.addEventListener('mouseup',   ()=>{drag=false});
  track.addEventListener('touchstart', e=>{drag=true;set(e.touches[0].clientX)},{passive:true});
  window.addEventListener('touchmove', e=>{if(drag)set(e.touches[0].clientX)},{passive:true});
  window.addEventListener('touchend',  ()=>{drag=false});
}
