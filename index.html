<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>K-Facility | 시설관리 대시보드</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <script src="main.js"></script>
  <!-- Firebase (준비되면 주석 해제, js/main.js 의 FB_CFG 값도 입력) -->
  <!-- <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>    -->
  <!-- <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>   -->
  <!-- <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script> -->
  <!-- <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>  -->
</head>
<body>
  <div class="bg-layer" aria-hidden="true">
    <div class="orb o1"></div><div class="orb o2"></div>
    <div class="orb o3"></div><div class="orb o4"></div>
  </div>

  <!-- LOGIN OVERLAY -->
  <div id="lov" role="dialog" aria-modal="true">
    <div class="lcard">
      <div class="ll">K-<em>Facility</em></div>
      <p class="ls">시설관리 통합 대시보드에<br>오신 걸 환영합니다</p>
      <button class="btn-google" id="btn-google">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google로 로그인
      </button>
      <div class="ldv">또는</div>
      <button class="btn-guest" id="btn-guest">👤 게스트로 둘러보기</button>
      <p class="ln">게스트 모드에서는 데이터 저장이 제한됩니다</p>
    </div>
  </div>

  <!-- APP -->
  <div id="app">
    <nav id="sidebar" aria-label="메인 내비게이션">
      <div class="s-logo">K-<em>F</em></div>
      <div class="s-div"></div>
      <button class="nb active" data-p="home"         title="홈">         <i class="fa-solid fa-house"></i>            <span class="tip">홈</span></button>
      <button class="nb"        data-p="search"       title="검색">       <i class="fa-solid fa-magnifying-glass"></i>  <span class="tip">검색</span></button>
      <div class="s-div"></div>
      <button class="nb"        data-p="electric"     title="전기">       <i class="fa-solid fa-bolt"></i>             <span class="tip">전기</span></button>
      <button class="nb"        data-p="mechanical"   title="기계">       <i class="fa-solid fa-gear"></i>             <span class="tip">기계</span></button>
      <button class="nb"        data-p="construction" title="영선">       <i class="fa-solid fa-hammer"></i>           <span class="tip">영선</span></button>
      <button class="nb"        data-p="fire"         title="소방">       <i class="fa-solid fa-fire-extinguisher"></i><span class="tip">소방</span></button>
      <button class="nb"        data-p="records"      title="작업기록">   <i class="fa-solid fa-clipboard-list"></i>   <span class="tip">작업기록</span></button>
      <button class="nb"        data-p="memo"         title="학습메모">   <i class="fa-solid fa-book-open"></i>        <span class="tip">학습메모</span></button>
      <button class="nb"        data-p="roadmap"      title="연간로드맵"> <i class="fa-solid fa-calendar-days"></i>    <span class="tip">연간로드맵</span></button>
      <div class="s-div" style="margin-top:auto"></div>
      <button class="nb"        data-p="contacts"     title="연락처">     <i class="fa-solid fa-address-book"></i>     <span class="tip">연락처</span></button>
      <button class="nb"        data-p="stats"        title="통계">       <i class="fa-solid fa-chart-bar"></i>        <span class="tip">통계</span></button>
      <button class="nb"        data-p="settings"     title="설정">       <i class="fa-solid fa-sliders"></i>          <span class="tip">설정</span></button>
    </nav>
    <div id="main">
      <header id="hdr">
        <div class="h-logo">K-<em>Facility</em></div>
        <div class="srch">
          <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
          <input type="search" id="si" placeholder="작업기록, 장비, 메모 검색..." aria-label="통합 검색"/>
        </div>
        <div class="h-right">
          <button class="ibtn dot" title="알림"><i class="fa-solid fa-bell"></i></button>
          <div class="ava" id="ava" role="button" tabindex="0">KF</div>
          <span class="uname" id="uname">관리자</span>
          <button class="tsw" id="tsw" aria-label="테마 전환"><div class="tsk" id="tsk"></div></button>
        </div>
      </header>
      <div id="page" role="main" aria-live="polite"></div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
